<!DOCTYPE html>
<html>

<head>
    <title>CRUD System</title>
    <link rel="stylesheet" href="CRUD/crud.css">
</head>

<body>
    <div class="crud">
        <div class="head">
            <h2>CRUD System</h2>
            <p>Product Management System</p>
        </div>

        <div class="inputs-section">
            <h3> Add Product </h3>
            <input type="text" id="title" placeholder="Title">
            <div class="price">
                <input onkeyup="getTotal()" type="number" id="price" placeholder="Price">
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="Taxes">
                <input onkeyup="getTotal()" type="number" id="discount" placeholder="Discount %">
                <small id="total"></small>
            </div>
            <input type="number" id="count" placeholder="Count">
            <input type="text" id="category" placeholder="Category">
            <button onclick="CreatProduct(), ClearData(), DisplayData()" id="submit">Create</button>
        </div>


        <div class="output-section">
            <h3> Products </h3>
            <div class="search-area">
                <input onkeyup="searchdata(this.value)" type="text" id="search" placeholder="Search...">
                <div class="btnsearch">
                    <button onclick="getsearchmood(this.id)" id="searchtitle">Search</button>
                    <!-- <button onclick="getsearchmood(this.id)" id="searchCat">Search by Category</button> -->
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Price</th>
                            <th>Taxes</th>
                            <th>Discount</th>
                            <th>Category</th>
                            <th>Total</th>
                            <th>Update</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="CRUD/crud.js"></script>
</body>

</html>
